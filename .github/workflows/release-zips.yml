name: Build per-language ZIPs

on:
  push:
    branches: [main]
    paths:
      - '.github/agents/**'
      - '.github/copilot-instructions.md'
      - '.github/prompts/**'
      - '.github/skills/**'
      - 'kit-en/**'
      - 'kit-es/**'
      - 'README.md'
      - 'GUIA-PASSO-A-PASSO.md'
      - 'framework.json'
      - 'scripts/build_language_kits.py'
      - '.github/workflows/release-zips.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build 3 ZIPs (PT, EN, ES)
        run: python3 scripts/build_language_kits.py --out dist --clean

      - name: Publish to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest kits (PT · EN · ES)
          body: |
            Auto-built kits per language.
            - `ai-maturity-kit-pt.zip` — kit completo em Português (Brasil)
            - `ai-maturity-kit-en.zip` — kit with English client docs
            - `ai-maturity-kit-es.zip` — kit con docs cliente en Español
          files: dist/*.zip
          make_latest: true
